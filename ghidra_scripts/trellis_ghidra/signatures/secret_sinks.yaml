# Secret sink function signatures for Trellis
# Functions that accept sensitive data (keys, passwords, tokens)

category: secret_sinks
description: Functions that accept sensitive data such as keys, passwords, and tokens

functions:
  # CommonCrypto - Keys and sensitive parameters
  - name: CCCrypt
    library: libcommonCrypto.dylib
    description: "Symmetric encryption - parameter 3 is the key"
    tags: [crypto, sink, key]
    
  - name: CCCryptorCreate
    library: libcommonCrypto.dylib
    description: "Create cryptor - parameter 3 is the key"
    tags: [crypto, sink, key]
    
  - name: CCHmac
    library: libcommonCrypto.dylib
    description: "HMAC - parameter 1 is the key"
    tags: [crypto, sink, key, hmac]
    
  - name: CCKeyDerivationPBKDF
    library: libcommonCrypto.dylib
    description: "PBKDF key derivation - parameter 1 is the password"
    tags: [crypto, sink, password]
    
  # Security Framework - Keychain
  - name: SecItemAdd
    library: Security.framework
    description: "Add keychain item - parameter 0 is the item dictionary"
    tags: [keychain, sink, storage]
    
  - name: SecItemUpdate
    library: Security.framework
    description: "Update keychain item - parameter 1 contains updated values"
    tags: [keychain, sink, storage]
    
  # Network headers (ObjC methods)
  - name: "setValue:forHTTPHeaderField:"
    library: Foundation.framework
    description: "Set HTTP header value - parameter 0 is the value"
    tags: [network, sink, header]
    
  - name: "addValue:forHTTPHeaderField:"
    library: Foundation.framework
    description: "Add HTTP header value - parameter 0 is the value"
    tags: [network, sink, header]
