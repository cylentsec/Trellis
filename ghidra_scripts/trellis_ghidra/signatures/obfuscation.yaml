# Obfuscation-related function signatures for Trellis
# Functions commonly used for Base64/Hex decoding and data deobfuscation

category: obfuscation
description: Base64/Hex decoding and data deobfuscation functions

functions:
  # iOS/Foundation Base64 APIs
  - name: "initWithBase64EncodedString:"
    library: Foundation.framework
    description: "Initialize NSData from Base64 string"
    tags: [obfuscation, base64, decode]
    
  - name: "initWithBase64EncodedData:"
    library: Foundation.framework
    description: "Initialize NSData from Base64 data"
    tags: [obfuscation, base64, decode]
    
  - name: "base64EncodedStringWithOptions:"
    library: Foundation.framework
    description: "Encode data as Base64 string"
    tags: [obfuscation, base64, encode]
    
  - name: "base64EncodedDataWithOptions:"
    library: Foundation.framework
    description: "Encode data as Base64 data"
    tags: [obfuscation, base64, encode]
    
  # Third-party Base64 libraries
  - name: "GTMBase64"
    library: GoogleToolbox
    description: "Google Toolbox Base64 decoder"
    tags: [obfuscation, base64, decode, third-party]
    
  - name: "RXBase64"
    library: RXCollections
    description: "RXCollections Base64 decoder"
    tags: [obfuscation, base64, decode, third-party]
    
  - name: "dataFromBase64String"
    library: custom
    description: "Custom Base64 decode function"
    tags: [obfuscation, base64, decode, custom]
    
  - name: "base64Decoded"
    library: custom
    description: "Custom Base64 decode method"
    tags: [obfuscation, base64, decode, custom]
    
  # Hex string decoding
  - name: "dataFromHexString:"
    library: custom
    description: "Convert hex string to data"
    tags: [obfuscation, hex, decode]
    
  - name: "hexString"
    library: custom
    description: "Convert data to hex string"
    tags: [obfuscation, hex, encode]
    
  - name: "unhexlify"
    library: custom
    description: "Python-style hex to data converter"
    tags: [obfuscation, hex, decode]
