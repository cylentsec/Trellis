category: networking
description: Network communications, TLS/SSL operations, and certificate validation

functions:
  - name: SSLHandshake
    library: Security.framework
    parameters:
      - name: context
        type: SSLContextRef
        description: SSL session context
    return:
      type: OSStatus
      description: errSecSuccess, errSSLWouldBlock, or error code
    security_notes:
      - Check if certificate validation is disabled
      - Verify minimum TLS version (should be TLS 1.2+)
      - Look for SSLSetSessionOption with kSSLSessionOptionBreakOnServerAuth
      - Check for custom certificate validation that may be insecure
      - Ensure proper error handling of handshake failures
      - Note Secure Transport is deprecated - recommend Network.framework

  - name: SSLSetPeerDomainName
    library: Security.framework
    parameters:
      - name: context
        type: SSLContextRef
        description: SSL session context
      - name: peerName
        type: const char*
        description: Expected hostname for certificate validation
        size_param: peerNameLen
      - name: peerNameLen
        type: size_t
        description: Length of hostname string
    return:
      type: OSStatus
      description: errSecSuccess or error code
    security_notes:
      - Verify this is called before SSLHandshake
      - Check if NULL or empty domain name is passed (disables hostname verification)
      - Look for IP addresses instead of hostnames
      - Ensure domain matches certificate CN or SAN
      - Check for wildcard domain abuse

  - name: SSLSetCertificate
    library: Security.framework
    parameters:
      - name: context
        type: SSLContextRef
        description: SSL session context
      - name: certRefs
        type: CFArrayRef
        description: Array of SecCertificateRef for client certificate chain
    return:
      type: OSStatus
      description: errSecSuccess or error code
    security_notes:
      - Verify certificate chain is complete and valid
      - Check if certificates are embedded in binary (security risk)
      - Ensure private key is protected in Keychain
      - Look for expired or self-signed certificates
      - Verify certificate is appropriate for intended use

  - name: SecTrustEvaluate
    library: Security.framework
    parameters:
      - name: trust
        type: SecTrustRef
        description: Trust object containing certificates to evaluate
      - name: result
        type: SecTrustResultType*
        description: Pointer to receive trust evaluation result
    return:
      type: OSStatus
      description: errSecSuccess or error code
    security_notes:
      - Check if result is ignored (certificate pinning bypass)
      - Verify kSecTrustResultUnspecified or kSecTrustResultProceed are required
      - Look for acceptance of kSecTrustResultRecoverableTrustFailure
      - Ensure all certificate chain errors are rejected
      - Note this API is deprecated on iOS 12+ - use SecTrustEvaluateWithError
      - Check for overly permissive trust evaluation

  - name: SecTrustEvaluateWithError
    library: Security.framework
    parameters:
      - name: trust
        type: SecTrustRef
        description: Trust object containing certificates to evaluate
      - name: error
        type: CFErrorRef*
        description: Pointer to receive error on failure
    return:
      type: bool
      description: true if trust evaluation succeeded, false otherwise
    security_notes:
      - Check if return value is ignored
      - Verify error handling is proper and not suppressed
      - Look for trust object manipulation before evaluation
      - Ensure certificate revocation checking is enabled
      - Check for disabled policy requirements

  - name: SecTrustSetAnchorCertificates
    library: Security.framework
    parameters:
      - name: trust
        type: SecTrustRef
        description: Trust object to modify
      - name: anchorCertificates
        type: CFArrayRef
        description: Array of SecCertificateRef to use as trust anchors
    return:
      type: OSStatus
      description: errSecSuccess or error code
    security_notes:
      - Critical - disables system root certificates (certificate pinning)
      - Verify custom anchors are legitimate and up-to-date
      - Check if this allows self-signed certificates
      - Look for hardcoded certificates in binary
      - Ensure SecTrustSetAnchorCertificatesOnly is not called with false
      - Validate certificate pinning implementation security
      - Check for certificate expiration handling

  - name: SecTrustSetAnchorCertificatesOnly
    library: Security.framework
    parameters:
      - name: trust
        type: SecTrustRef
        description: Trust object to modify
      - name: anchorCertificatesOnly
        type: Boolean
        description: If true, only use anchors from SecTrustSetAnchorCertificates
    return:
      type: OSStatus
      description: errSecSuccess or error code
    security_notes:
      - When false, allows system + custom anchors (reduces pinning strictness)
      - When true, enforces strict certificate pinning
      - Verify proper certificate rotation mechanism exists
      - Check for backup pins in case primary expires

  - name: SecTrustSetPolicies
    library: Security.framework
    parameters:
      - name: trust
        type: SecTrustRef
        description: Trust object to modify
      - name: policies
        type: CFTypeRef
        description: SecPolicyRef or CFArrayRef of policies to apply
    return:
      type: OSStatus
      description: errSecSuccess or error code
    security_notes:
      - Check if weak policies are applied (kSecPolicyAppleSSL with no hostname)
      - Verify revocation checking policies are included
      - Look for custom policies that may weaken security
      - Ensure appropriate policy for context (SSL, code signing, etc.)

  - name: nw_connection_create
    library: Network.framework
    parameters:
      - name: endpoint
        type: nw_endpoint_t
        description: Remote endpoint to connect to
      - name: parameters
        type: nw_parameters_t
        description: Connection parameters including protocol options
    return:
      type: nw_connection_t
      description: New connection object
    security_notes:
      - Check TLS parameters configuration
      - Verify certificate validation is enabled
      - Look for disabled TLS verification options
      - Check minimum TLS version requirements
      - Ensure proper protocol stack (TLS over TCP)
      - Verify no custom TLS trust evaluators that weaken security

  - name: nw_connection_start
    library: Network.framework
    parameters:
      - name: connection
        type: nw_connection_t
        description: Connection to start
    return:
      type: void
      description: No return value
    security_notes:
      - Verify connection uses TLS for sensitive data
      - Check if state change handler properly validates connection
      - Ensure error states are handled securely
      - Look for connections to HTTP instead of HTTPS endpoints

  - name: nw_parameters_create_secure_tcp
    library: Network.framework
    parameters:
      - name: configure_tls
        type: nw_parameters_configure_protocol_block_t
        description: Block to configure TLS options (can be NULL for defaults)
      - name: configure_tcp
        type: nw_parameters_configure_protocol_block_t
        description: Block to configure TCP options (can be NULL for defaults)
    return:
      type: nw_parameters_t
      description: New parameters object with TLS over TCP
    security_notes:
      - Check if configure_tls block weakens security
      - Verify minimum TLS version is set appropriately
      - Look for disabled certificate validation
      - Ensure cipher suite configuration is secure

  - name: nw_tls_copy_sec_protocol_options
    library: Network.framework
    parameters:
      - name: options
        type: nw_protocol_options_t
        description: TLS protocol options
    return:
      type: sec_protocol_options_t
      description: Security protocol options for configuration
    security_notes:
      - Check subsequent sec_protocol_options calls for security issues
      - Verify certificate validation settings
      - Look for custom trust evaluators

  - name: sec_protocol_options_set_min_tls_protocol_version
    library: Network.framework
    parameters:
      - name: options
        type: sec_protocol_options_t
        description: Security protocol options
      - name: version
        type: tls_protocol_version_t
        description: Minimum TLS version (TLS 1.0, 1.1, 1.2, 1.3)
    return:
      type: void
      description: No return value
    security_notes:
      - Flag if minimum is below TLS 1.2
      - TLS 1.0 and 1.1 are deprecated and insecure
      - Verify maximum version is not artificially limited
      - Recommend TLS 1.3 where possible

  - name: sec_protocol_options_set_peer_authentication_required
    library: Network.framework
    parameters:
      - name: options
        type: sec_protocol_options_t
        description: Security protocol options
      - name: peer_authentication_required
        type: bool
        description: Whether server certificate validation is required
    return:
      type: void
      description: No return value
    security_notes:
      - Critical security issue if set to false
      - Disables all certificate validation
      - Only acceptable for localhost/testing scenarios
      - Flag all instances of false in production code

  - name: sec_protocol_options_set_verify_block
    library: Network.framework
    parameters:
      - name: options
        type: sec_protocol_options_t
        description: Security protocol options
      - name: verify_block
        type: sec_protocol_verify_t
        description: Custom certificate verification block
      - name: verify_block_queue
        type: dispatch_queue_t
        description: Queue to execute verification block on
    return:
      type: void
      description: No return value
    security_notes:
      - Critical - custom verification can bypass security
      - Verify block properly validates certificates
      - Check if block always returns true (bypasses validation)
      - Ensure proper certificate chain validation
      - Look for weak hostname verification
      - Verify trust evaluation is performed correctly

  - name: sec_protocol_options_add_tls_application_protocol
    library: Network.framework
    parameters:
      - name: options
        type: sec_protocol_options_t
        description: Security protocol options
      - name: application_protocol
        type: const char*
        description: Application protocol name for ALPN
    return:
      type: void
      description: No return value
    security_notes:
      - Verify appropriate protocols are specified
      - Check for outdated protocol versions (http/1.0)
      - Ensure protocol matches intended use

  - name: sec_protocol_options_add_tls_ciphersuite
    library: Network.framework
    parameters:
      - name: options
        type: sec_protocol_options_t
        description: Security protocol options
      - name: ciphersuite
        type: tls_ciphersuite_t
        description: Specific cipher suite to allow
    return:
      type: void
      description: No return value
    security_notes:
      - Check for weak cipher suites (NULL, EXPORT, DES, RC4, MD5)
      - Verify forward secrecy cipher suites are preferred (ECDHE, DHE)
      - Look for deprecated cipher suites
      - Ensure cipher list doesn't reduce security below system defaults

  - name: sec_protocol_options_set_tls_server_name
    library: Network.framework
    parameters:
      - name: options
        type: sec_protocol_options_t
        description: Security protocol options
      - name: server_name
        type: const char*
        description: Server hostname for SNI and certificate validation
    return:
      type: void
      description: No return value
    security_notes:
      - Verify server name matches intended endpoint
      - Check for NULL or empty server name (disables hostname verification)
      - Ensure server name is not an IP address
      - Look for hardcoded server names that may be incorrect
